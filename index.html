<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لحبيبتي إيسو ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            text-align: center;
            padding: 50px 20px;
            color: #4a0011;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 500px;
            width: 100%;
        }
        input, button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ff4d6d;
            font-size: 16px;
        }
        button {
            background-color: #ff4d6d;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover { background-color: #ff1a43; }
        #love-message { display: none; margin-top: 20px; font-size: 20px; line-height: 1.6; }
        img { max-width: 100%; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* إخفاء فيديو اليوتيوب تماماً عشان يشتغل كصوت في الخلفية */
        #youtube-player { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-form">
        <h2>أهلاً يا أميرتي إيسو 👑</h2>
        <p>اكتبي كلمة السر السرية عشان تشوفي اللي مستنيكي:</p>
        <input type="password" id="password" placeholder="كلمة السر...">
        <button onclick="checkPassword()">افتحي قلبي ❤️</button>
    </div>

    <div id="love-message">
        <!-- صورتها اللي أنت رفعتها -->
        <img src="pic.jpg" alt="أميرتي إيسو">
        
        <h2>كل سنة وأنتِ معايا يا كل حياتي يا إيسو ❤️</h2>
        <p>أنا بحبك جداً ومقدرش أعيش من غيرك، أنتِ أجمل حاجة حصلت في دنيتي كلها.. ربنا يخليكي ليا وميحرمنيش منك أبداً ويجمعنا على خير يا رب.</p>
        <p style="font-size: 18px; font-style: italic; color: #ff4d6d;">"خليني في حضنك يا حبيبي ده في حضنك بهدى وبرتاح..." 🎵</p>
        
        <!-- مشغل يوتيوب مخفي للأغنية -->
        <iframe id="youtube-player" src="https://www.youtube.com/embed/gI8g5o3Gsm4?enablejsapi=1" allow="autoplay"></iframe>
    </div>
</div>

<script>
    function checkPassword() {
        var password = document.getElementById("password").value;
        if (password === "love") { 
            document.getElementById("login-form").style.display = "none";
            document.getElementById("love-message").style.display = "block";
            
            // تشغيل أغنية بهاء سلطان من يوتيوب تلقائياً
            var player = document.getElementById("youtube-player");
            player.src += "&autoplay=1";
        } else {
            alert("كلمة السر غلط يا روحي، حاولي تاني! 😘");
        }
    }
</script>

</body>
</html>

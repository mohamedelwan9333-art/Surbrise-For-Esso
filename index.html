<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لحبيبتي إيسو ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            text-align: center;
            padding: 50px 20px;
            color: #4a0011;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 500px;
            width: 100%;
        }
        input, button {
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ff4d6d;
            font-size: 16px;
            font-weight: bold;
        }
        button {
            background-color: #ff4d6d;
            color: white;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        button:hover { background-color: #ff1a43; }
        #love-message { display: none; margin-top: 20px; font-size: 20px; line-height: 1.6; }
        .music-btn {
            background-color: #28a745;
            margin-top: 15px;
            display: inline-block;
        }
        .music-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-form">
        <h2>أهلاً يا أميرتي إيسو 👑</h2>
        <p>اكتبي كلمة السر السرية عشان تشوفي اللي مستنيكي:</p>
        <input type="password" id="password" placeholder="كلمة السر...">
        <button onclick="checkPassword()">افتحي قلبي ❤️</button>
    </div>

    <div id="love-message">
        <h2>كل سنة وأنتِ معايا يا كل حياتي يا إيسو ❤️</h2>
        <p>أنا بحبك جداً ومقدرش أعيش من غيرك، أنتِ أجمل حاجة حصلت في دنيتي كلها.. ربنا يخليكي ليا وميحرمنيش منك أبداً ويجمعنا على خير يا رب.</p>
        <p style="font-size: 18px; font-style: italic; color: #ff4d6d;">"خليني في حضنك يا حبيبي ده في حضنك بهدى وبرتاح..." 🎵</p>
        
        <!-- زرار إجبار تشغيل الصوت المباشر -->
        <button class="music-btn" onclick="playMusic()">اضغطي هنا لتشغيل الأغنية 🎵</button>
        
        <audio id="bg-music" loop>
            <source src="https://archive.org/download/bahaa-sultan-tamnony-3lek/%D8%A8%D9%87%D8%A7%D8%A1%20%D8%B3%D9%84%D8%B7%D8%A7%D9%86%20-%20%D8%B7%D9%85%D9%86%D9%88%D9%86%D9%8A%20%D8%B9%D9%84%D9%8A%D9%83.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
    function checkPassword() {
        var password = document.getElementById("password").value;
        if (password === "love") { 
            document.getElementById("login-form").style.display = "none";
            document.getElementById("love-message").style.display = "block";
        } else {
            alert("كلمة السر غلط يا روحي، حاولي تاني! 😘");
        }
    }

    function playMusic() {
        var audio = document.getElementById("bg-music");
        audio.play().then(function() {
            alert("الأغنية اشتغلت بنجاح! الاستماع ممتع يا أميرتي ❤️");
        }).catch(function(error) {
            alert("برضه المتصفح مانعها؟ جربي تفتحي اللينك في متصفح تاني زي جوجل كروم العادي.");
        });
    }
</script>

</body>
</html>
